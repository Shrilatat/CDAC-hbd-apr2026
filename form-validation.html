<!DOCTYPE html>
<html lang="en">

<head>
    <style>
        span{color:red}
    </style>
    <script>
        function validateUsername() {
            var uname = document.getElementById("uname").value
            if (uname.length == 0 || uname == null || uname == "") {
                document.getElementById("s1").innerHTML = ("Username is required")
                return false;
            }
            else if (uname.length < 5) {
                document.getElementById("s1").innerHTML = ("Username should be min 5 chars")
                return false;
            }
            return true;
        }

        function validatePassword() {
            var pass = document.getElementById("pass").value
            if (pass.length == 0 || pass == null || pass == "") {
                document.getElementById("s2").innerHTML = ("Password is required")
                return false;
            }
            else if (pass.length < 5 || pass.length > 10) {
                document.getElementById("s2").innerHTML = ("Password not in range")
                return false;
            }
            return true;
        }

        function validate(){
            if (validateUsername() && validatePassword())
                return true;
            else 
                return false
        }
    </script>
</head>

<body>
    <form onsubmit="return validate()">
        Username *: <input id="uname"><span id="s1"></span><br>
        Password *: <input id="pass"><span id="s2"></span><br>
        <input type="submit">
    </form>
</body>

</html>
