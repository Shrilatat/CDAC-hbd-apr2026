<html>
    <head>
        <script>
            function greet(){   //event handler
               var sname = document.getElementById("t1").value
               document.getElementById("p1").innerHTML = "Hello " + sname
            }
        </script>
    </head>
    <body>
       <form>
         Username : <input type="text" id="t1"><br>
         <input type="button" value="Greet User" onclick="greet()">
       </form>
       <p id="p1"></p>
    </body>
</html>
